<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftFlow</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>LiftFlow</h1>
      </div>

      <div class="hero-settings">
        <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
        <div id="settingsMenu" class="settings-menu hidden">
          <button id="openSetupBtn">Initial Setup</button>
          <button id="driveSyncBtn">Drive Sync</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="record">Training</button>
      <button class="tab" data-tab="history">History</button>
    </div>

    <div id="record-root">
      <div id="training-page">
        <div class="card stack">
          <div class="calendar-header">
            <div class="section-title">Trend</div>
            <div class="calendar-nav">
              <button id="prevChartBtn" class="mini-btn" type="button">‹</button>
              <button id="nextChartBtn" class="mini-btn" type="button">›</button>
            </div>
          </div>
          <div class="chart-box">
            <div class="chart-title">Total Volume × Avg Weight</div>
            <canvas id="historyComboCanvas" width="380" height="220"></canvas>
          </div>
        </div>

        <div class="card stack" id="suggestionCard">
          <div class="section-title">Plan</div>
          <div class="suggestion">
            <div>
              <h2 id="exerciseName">-</h2>
              <div id="lastPerformed" class="sub">Previous: -</div>
            </div>

            <div class="body-map-inline">
              <div class="body-map-card">
                <div class="body-map-label">Front</div>
                <svg id="frontBody" viewBox="0 0 140 260" width="100%" height="138">
                  <rect x="52" y="16" width="36" height="36" rx="18" fill="#192231" stroke="#2b3646"/>
                  <rect x="47" y="52" width="46" height="58" rx="20" fill="#192231" stroke="#2b3646"/>
                  <rect id="chestFront" x="50" y="60" width="40" height="18" rx="8" fill="#1f2937"/>
                  <rect id="shoulderFrontL" x="36" y="56" width="14" height="20" rx="7" fill="#1f2937"/>
                  <rect id="shoulderFrontR" x="90" y="56" width="14" height="20" rx="7" fill="#1f2937"/>
                  <rect id="latFrontL" x="40" y="78" width="12" height="24" rx="6" fill="#1f2937"/>
                  <rect id="latFrontR" x="88" y="78" width="12" height="24" rx="6" fill="#1f2937"/>
                  <rect id="quadFrontL" x="48" y="112" width="16" height="52" rx="8" fill="#1f2937"/>
                  <rect id="quadFrontR" x="76" y="112" width="16" height="52" rx="8" fill="#1f2937"/>
                  <rect x="23" y="58" width="16" height="78" rx="8" fill="#192231" stroke="#2b3646"/>
                  <rect x="101" y="58" width="16" height="78" rx="8" fill="#192231" stroke="#2b3646"/>
                  <rect x="50" y="164" width="14" height="70" rx="7" fill="#192231" stroke="#2b3646"/>
                  <rect x="76" y="164" width="14" height="70" rx="7" fill="#192231" stroke="#2b3646"/>
                </svg>
              </div>

              <div class="body-map-card">
                <div class="body-map-label">Back</div>
                <svg id="backBody" viewBox="0 0 140 260" width="100%" height="138">
                  <rect x="52" y="16" width="36" height="36" rx="18" fill="#192231" stroke="#2b3646"/>
                  <rect x="47" y="52" width="46" height="58" rx="20" fill="#192231" stroke="#2b3646"/>
                  <rect id="upperBack" x="50" y="58" width="40" height="22" rx="8" fill="#1f2937"/>
                  <rect id="latBackL" x="40" y="78" width="16" height="28" rx="8" fill="#1f2937"/>
                  <rect id="latBackR" x="84" y="78" width="16" height="28" rx="8" fill="#1f2937"/>
                  <rect id="gluteL" x="52" y="108" width="16" height="20" rx="8" fill="#1f2937"/>
                  <rect id="gluteR" x="72" y="108" width="16" height="20" rx="8" fill="#1f2937"/>
                  <rect id="hamL" x="48" y="130" width="16" height="44" rx="8" fill="#1f2937"/>
                  <rect id="hamR" x="76" y="130" width="16" height="44" rx="8" fill="#1f2937"/>
                  <rect x="23" y="58" width="16" height="78" rx="8" fill="#192231" stroke="#2b3646"/>
                  <rect x="101" y="58" width="16" height="78" rx="8" fill="#192231" stroke="#2b3646"/>
                  <rect x="50" y="174" width="14" height="60" rx="7" fill="#192231" stroke="#2b3646"/>
                  <rect x="76" y="174" width="14" height="60" rx="7" fill="#192231" stroke="#2b3646"/>
                </svg>
              </div>
            </div>

            <div id="muscleNames" class="muscle-list"></div>

            <div class="goal-grid">
              <div class="goal-box">
                <div class="goal-label">Sets</div>
                <div class="goal-value" id="goalSets">-</div>
              </div>
              <div class="goal-box">
                <div class="goal-label">Reps</div>
                <div class="goal-value" id="goalReps">-</div>
              </div>
            </div>

            <div class="ai-box" id="aiSuggestionText">Plan text</div>
          </div>
        </div>

        <div class="card stack" id="timerCard">
          <div class="section-title">Rest Timer</div>
          <div class="timer-mini">
            <div class="timer-left">
              <div class="timer-time" id="restDisplay">02:00</div>
            </div>
            <div class="mini-actions">
              <button class="mini-btn" id="restStart">Start</button>
              <button class="mini-btn" id="restReset">Reset</button>
            </div>
          </div>

          <div class="inline">
            <div>
              <label>Min</label>
              <input type="number" id="restMin" min="0" value="2" class="time-input" />
            </div>
            <div>
              <label>Sec</label>
              <input type="number" id="restSec" min="0" max="59" value="0" class="time-input" />
            </div>
          </div>
        </div>

        <div class="card stack" id="recordCard">
          <div class="section-title">Set Entry</div>
          <div class="record-grid">
            <select id="setNumber"></select>
            <select id="repNumber"></select>
            <select id="weightNumber"></select>
            <button class="primary" id="addSetBtn">Confirm</button>
          </div>
          <div class="record-list" id="setRecords"></div>
        </div>

        <div class="card stack">
          <div class="section-title">Trend</div>
          <div class="chart-box">
            <div class="chart-title">Volume × Avg Weight</div>
            <canvas id="trainingTrendCanvas" width="380" height="220"></canvas>
          </div>
        </div>

        <div class="card stack" id="recoveryCard">
          <div class="section-title">Recovery Comment</div>
          <div class="ai-box" id="dailyAiText">Recovery text</div>
        </div>
      </div>
    </div>

    <div id="history-root" class="hidden">
      <div class="card stack">
        <div class="calendar-header">
          <div>
            <div class="section-title">Calendar</div>
            <div class="sub" id="calendarMonthLabel"></div>
          </div>
          <div style="min-width:160px;">
            <select id="calendarMetricSelect">
              <option value="total">総挙上量</option>
              <option value="upper">上半身の総挙上量</option>
              <option value="lower">下半身の総挙上量</option>
              <option value="chest">胸の総挙上量</option>
              <option value="shoulder">肩の総挙上量</option>
              <option value="back">背中の総挙上量</option>
              <option value="arms">腕の総挙上量</option>
            </select>
          </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div class="card stack">
        <div class="section-title">Range</div>
        <div class="segmented">
          <button class="segment active" data-range="daily">Daily</button>
          <button class="segment" data-range="weekly">Weekly</button>
          <button class="segment" data-range="monthly">Monthly</button>
        </div>

        <div class="calendar-header" style="margin-top:14px;">
          <div class="section-title" style="margin-bottom:0;">Summary</div>
          <div style="min-width:160px;">
            <select id="summaryMetricSelect">
              <option value="total">全身</option>
              <option value="upper">上半身</option>
              <option value="lower">下半身</option>
              <option value="chest">胸</option>
              <option value="shoulder">肩</option>
              <option value="back">背中</option>
              <option value="arms">腕</option>
            </select>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">総挙上量</div>
            <div class="summary-value" id="summaryVolume">-</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">平均重量</div>
            <div class="summary-value" id="summaryAvgWeight">-</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">総回数</div>
            <div class="summary-value" id="summaryReps">-</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">セット数</div>
            <div class="summary-value" id="summarySets">-</div>
          </div>
        </div>
      </div>

      <div class="card stack">
        <div class="section-title">Trend</div>
        <div class="chart-box">
          <div class="chart-title">Total Volume × Avg Weight</div>
          <canvas id="historyComboCanvas" width="380" height="220"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="setupModal" class="hidden">
    <div class="setup-backdrop"></div>
    <div class="setup-panel">
      <h3>Initial Setup</h3>
      <div class="setup-grid">
        <div><label>Height (cm)</label><input id="profileHeight" type="number" /></div>
        <div><label>Weight (kg)</label><input id="profileWeight" type="number" /></div>
        <div>
          <label>Goal</label>
          <select id="profileGoal">
            <option value="hypertrophy">筋肥大</option>
            <option value="strength">筋力向上</option>
            <option value="cut">減量</option>
          </select>
        </div>
        <div><label>Training Frequency / week</label><input id="profileFrequency" type="number" min="1" max="7" /></div>
        <div><label>Bench Press PB (kg)</label><input id="pbBench" type="number" /></div>
        <div><label>Squat PB (kg)</label><input id="pbSquat" type="number" /></div>
        <div><label>Deadlift PB (kg)</label><input id="pbDeadlift" type="number" /></div>
      </div>
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button id="saveProfileBtn">Save</button>
        <button id="closeSetupBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="./js/constants.js"></script>
  <script src="./js/sampleData.js"></script>
  <script src="./js/helpers.js"></script>
  <script src="./js/drive.js"></script>
  <script src="./js/ai.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
